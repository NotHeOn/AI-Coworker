<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Context Editor — AI Coworker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface2: #252530;
      --border: #2e2e3a;
      --accent: #7c6aff;
      --text: #e8e8f0;
      --text-muted: #8888a0;
      --error: #f87171;
      --success: #4ade80;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono: "Cascadia Code", "Fira Code", "Consolas", monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.6; }

    .page { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; }

    /* ── Header ── */
    .page-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; }
    .page-header-icon { font-size: 20px; padding-top: 2px; flex-shrink: 0; }
    .page-title { font-size: 15px; font-weight: 600; color: var(--text); word-break: break-word; }
    .page-url  { font-size: 11px; color: var(--text-muted); word-break: break-all; margin-top: 2px; }

    /* ── Stats chips ── */
    .stats { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 20px;
      border: 1px solid var(--border); background: var(--surface);
      font-size: 11px; color: var(--text-muted);
    }
    .chip .chip-val { color: var(--text); font-weight: 600; }

    /* ── Section card ── */
    .section { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 14px; overflow: hidden; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: var(--surface); cursor: pointer;
      user-select: none;
    }
    .section-header:hover { background: var(--surface2); }
    .section-title { font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
    .section-toggle { font-size: 11px; color: var(--text-muted); }
    .section-body { padding: 14px; background: var(--bg); }
    .section-body.hidden { display: none; }

    /* ── Pre / code ── */
    pre {
      white-space: pre-wrap; word-break: break-word;
      font-family: var(--mono); font-size: 12px; color: var(--text); line-height: 1.65; tab-size: 2;
    }

    /* ── Loading / error ── */
    .state-msg { padding: 40px 20px; text-align: center; color: var(--text-muted); font-size: 13px; }
    .state-msg.error { color: var(--error); }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Banner ── */
    .banner {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 14px; margin-bottom: 14px; border-radius: 8px;
      background: rgba(124, 106, 255, 0.1); border: 1px solid rgba(124, 106, 255, 0.3);
      font-size: 12px; color: var(--text-muted);
    }
    .banner.applied {
      background: rgba(74, 222, 128, 0.1); border-color: rgba(74, 222, 128, 0.3); color: var(--success);
    }

    /* ── Editable textarea ── */
    .edit-textarea {
      width: 100%; min-height: 120px; resize: none; overflow: hidden;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--mono); font-size: 12px; line-height: 1.65;
      padding: 10px 12px; tab-size: 2; transition: border-color 0.15s;
    }
    .edit-textarea:focus { outline: none; border-color: var(--accent); }

    /* ── Toolbar ── */
    .toolbar { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    .toolbar-btn {
      padding: 3px 10px; border-radius: 6px; font-size: 11px; cursor: pointer;
      border: 1px solid var(--border); background: var(--surface); color: var(--text-muted);
    }
    .toolbar-btn:hover { border-color: var(--accent); color: var(--accent); }
    .toolbar-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .toolbar-spacer { flex: 1; }

    .apply-btn {
      padding: 5px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer;
      background: var(--accent); color: #fff; border: none; transition: opacity 0.15s;
    }
    .apply-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="page">
    <div id="root"><div class="state-msg"><span class="spinner"></span>Loading context…</div></div>
  </div>
  <script type="module" src="context-editor.js"></script>
</body>
</html>
