<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Coworker — Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f11;
      --surface: #1a1a1f;
      --surface2: #252530;
      --border: #2e2e3a;
      --accent: #7c6aff;
      --text: #e8e8f0;
      --text-muted: #8888a0;
      --error: #f87171;
      --success: #4ade80;
      --radius: 12px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
      padding: 32px 20px;
    }

    .container { width: 100%; max-width: 760px; margin: 0 auto; }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 18px; font-weight: 600; }

    /* ── Two-panel layout ── */
    .layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }
    @media (max-width: 600px) { .layout { grid-template-columns: 1fr; } }

    /* ── Section heading ── */
    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin: 32px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 12px;
    }

    /* ── Profile list ── */
    .profile-list { display: flex; flex-direction: column; gap: 10px; }

    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 0.15s;
    }
    .profile-card.active { border-color: var(--accent); }

    .profile-card-header { display: flex; align-items: center; gap: 8px; }
    .profile-name { font-size: 14px; font-weight: 600; flex: 1; }

    .active-badge {
      font-size: 10px;
      font-weight: 600;
      background: rgba(124,106,255,0.18);
      color: var(--accent);
      border: 1px solid rgba(124,106,255,0.35);
      padding: 2px 7px;
      border-radius: 10px;
    }

    .profile-meta {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .profile-actions { display: flex; gap: 6px; margin-top: 4px; }

    .btn-sm {
      padding: 4px 10px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font);
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .btn-sm:hover { background: var(--border); color: var(--text); }
    .btn-sm:disabled { opacity: 0.35; cursor: default; }
    .btn-sm.activate { border-color: rgba(124,106,255,0.4); color: var(--accent); }
    .btn-sm.activate:hover { background: rgba(124,106,255,0.15); border-color: var(--accent); }
    .btn-sm.danger:hover { background: rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.4); color: var(--error); }

    .empty-state {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.6;
    }

    /* ── Form panel ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }

    .form-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--text); }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input[type="password"],
    input[type="text"],
    input[type="url"],
    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    input:focus, textarea:focus { border-color: var(--accent); }

    .input-row { display: flex; gap: 8px; }
    .input-row input { flex: 1; }

    .toggle-visibility {
      padding: 9px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      font-family: var(--font);
      white-space: nowrap;
      transition: background 0.15s;
    }
    .toggle-visibility:hover { background: var(--border); }

    /* Provider preset buttons */
    .presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .preset-btn {
      padding: 5px 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      font-size: 11px;
      font-family: var(--font);
      cursor: pointer;
      transition: all 0.15s;
    }
    .preset-btn:hover {
      background: rgba(124,106,255,0.12);
      border-color: rgba(124,106,255,0.4);
      color: var(--accent);
    }

    .btn-primary {
      width: 100%;
      padding: 10px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: #6b58ee; }

    .btn-secondary {
      width: 100%;
      padding: 9px;
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: var(--surface2); color: var(--text); }

    .btn-danger-outline {
      width: 100%;
      padding: 9px;
      background: transparent;
      color: var(--error);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 8px;
      font-family: var(--font);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-danger-outline:hover { background: rgba(248,113,113,0.08); border-color: var(--error); }

    .status {
      margin-top: 10px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }

    .helper { font-size: 11px; color: var(--text-muted); margin-top: 5px; line-height: 1.5; }

    /* ── Presets panel ── */
    .preset-list { display: flex; flex-direction: column; gap: 8px; }

    .preset-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .preset-row-info { flex: 1; min-width: 0; }
    .preset-row-label { font-size: 13px; font-weight: 600; display: block; }
    .preset-row-preview {
      font-size: 11px;
      color: var(--text-muted);
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .preset-row-actions { display: flex; gap: 4px; flex-shrink: 0; }

    /* ── Chat History section ── */
    .history-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 12px;
      overflow: hidden;
    }

    .history-group-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.12s;
    }

    .history-group-header:hover { background: var(--surface2); }

    .history-group-chevron {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    .history-group-chevron.open { transform: rotate(90deg); }

    .history-group-name {
      flex: 1;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-group-meta {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .history-group-actions { display: flex; gap: 6px; flex-shrink: 0; }

    .history-group-records {
      border-top: 1px solid var(--border);
      display: none;
    }

    .history-group-records.open { display: block; }

    .history-rec-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }

    .history-rec-row:last-child { border-bottom: none; }

    .history-rec-title {
      flex: 1;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-rec-url {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      max-width: 140px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .history-rec-date {
      font-size: 10px;
      color: var(--text-muted);
      flex-shrink: 0;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon48.png" alt="logo" />
      <h1>AI Coworker — Settings</h1>
    </div>

    <!-- ── Profiles section ── -->
    <div class="section-title">Model Profiles</div>
    <div class="layout">
      <!-- Left: Profiles list -->
      <div>
        <div class="panel-title">Saved Profiles</div>
        <div class="profile-list" id="profileList"></div>
      </div>

      <!-- Right: Add/Edit form -->
      <div>
        <div class="panel-title" id="formPanelTitle">Add Profile</div>
        <div class="form-card">
          <div class="presets">
            <button class="preset-btn" data-preset="claude">Claude</button>
            <button class="preset-btn" data-preset="openai">OpenAI</button>
            <button class="preset-btn" data-preset="ollama">Ollama (local)</button>
          </div>

          <div class="field">
            <label for="profileName">Profile Name</label>
            <input type="text" id="profileName" placeholder="e.g. Claude Opus" />
          </div>

          <div class="field">
            <label for="baseUrl">Base URL</label>
            <input type="url" id="baseUrl" placeholder="https://api.anthropic.com/v1" />
            <p class="helper">The API base URL (without trailing slash).</p>
          </div>

          <div class="field">
            <label for="modelName">Model Name</label>
            <input type="text" id="modelName" placeholder="e.g. claude-opus-4-6" />
          </div>

          <div class="field">
            <label for="apiKey">API Key</label>
            <div class="input-row">
              <input type="password" id="apiKey" placeholder="sk-…" autocomplete="off" />
              <button class="toggle-visibility" id="toggleVisibility">Show</button>
            </div>
            <p class="helper">Leave blank for local models that don't require authentication.</p>
          </div>

          <input type="hidden" id="editingId" value="" />

          <button class="btn-primary" id="saveBtn">Save &amp; Activate Profile</button>
          <button class="btn-secondary" id="cancelEditBtn" style="display:none">Cancel Edit</button>
          <div class="status" id="status"></div>
        </div>
      </div>
    </div>

    <!-- ── Presets section ── -->
    <div class="section-title">Quick Prompt Presets</div>
    <div class="layout">
      <!-- Left: Preset list -->
      <div>
        <div class="panel-title">Saved Presets</div>
        <div class="preset-list" id="presetList"></div>
      </div>

      <!-- Right: Add/Edit preset form -->
      <div>
        <div class="panel-title">Add / Edit Preset</div>
        <div class="form-card">
          <div class="field">
            <label for="presetLabel">Button Label</label>
            <input type="text" id="presetLabel" placeholder="e.g. Summarize" maxlength="40" />
          </div>

          <div class="field">
            <label for="presetPrompt">Prompt</label>
            <textarea id="presetPrompt" placeholder="e.g. Summarize this page in 3 bullet points." rows="4"></textarea>
          </div>

          <input type="hidden" id="presetEditingId" value="" />

          <button class="btn-primary" id="presetSaveBtn">Add Preset</button>
          <button class="btn-secondary" id="presetCancelBtn" style="display:none">Cancel Edit</button>
          <button class="btn-danger-outline" id="presetResetBtn">Reset to Defaults</button>
          <div class="status" id="presetStatus"></div>
        </div>
      </div>
    </div>
    <!-- ── Chat History section ── -->
    <div class="section-title">Chat History</div>
    <div id="chatHistorySection">
      <div class="empty-state" id="chatHistoryEmpty" style="display:none">No chat history yet.</div>
    </div>
  </div>

  <script src="settings.js"></script>
</body>
</html>
