<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Coworker</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <img src="icons/icon32.png" alt="logo" class="logo" />
        <span class="title">AI Coworker</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="historyBtn" title="Chat history">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/>
            <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/>
          </svg>
        </button>
        <button class="icon-btn" id="clearBtn" title="New conversation">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
            <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5v11z"/>
          </svg>
        </button>
        <button class="icon-btn" id="settingsBtn" title="Settings">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
            <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.892 3.433-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.474l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Page context indicator -->
    <div class="page-context" id="pageContext">
      <span class="context-icon">📄</span>
      <span class="context-text" id="contextText">No page loaded</span>
      <label class="toggle-label" title="Re-read page content on every message (default: only on first message)">
        <input type="checkbox" id="syncPageToggle" />
        <span class="toggle-text">Sync page</span>
      </label>
    </div>

    <!-- Full-screen history view (swaps with messages area) -->
    <div id="historyView" class="history-view hidden">
      <div class="history-view-header">
        <button id="historyBackBtn" class="history-back-btn" title="Back to chat">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8z"/>
          </svg>
        </button>
        <span id="historyViewOrigin" class="history-view-origin"></span>
        <button id="historyNewBtn" class="history-new-btn">+ New</button>
      </div>
      <div id="historyViewList" class="history-view-list"></div>
    </div>

    <!-- Chat messages -->
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">🤖</div>
        <h3>AI Coworker</h3>
        <p>I can read and analyze the current page for you. Ask me anything!</p>
        <div class="quick-prompts">
          <button class="quick-btn" data-prompt="Summarize this page in 3 bullet points.">Summarize</button>
          <button class="quick-btn" data-prompt="What are the key takeaways from this page?">Key Points</button>
          <button class="quick-btn" data-prompt="Extract all important facts and data from this page.">Extract Facts</button>
          <button class="quick-btn" data-prompt="What action should I take based on this page?">Next Steps</button>
        </div>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <!-- Profile dropdown (shown above input when open) -->
      <div id="profileDropdown" class="profile-dropdown hidden"></div>

      <!-- Selection chip — shown when the user has text selected on the page -->
      <div id="selectionChip" class="selection-chip hidden">
        <span class="selection-chip-icon">✂</span>
        <span id="selectionChipText" class="selection-chip-text"></span>
        <button id="selectionChipDismiss" class="selection-chip-dismiss" title="Clear selection">×</button>
      </div>

      <div class="input-wrapper">
        <textarea
          id="instruction"
          placeholder="Ask anything about this page…"
          rows="1"
          maxlength="2000"
        ></textarea>
        <button class="send-btn" id="sendBtn" title="Send (Enter)">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.002.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z"/>
          </svg>
        </button>
      </div>
      <div class="input-footer">
        <button id="profileSwitcher" class="model-badge" title="Switch profile">Loading…</button>
        <span class="char-count" id="charCount">0 / 2000</span>
      </div>
    </div>
  </div>

  <!-- Marked.js must run as classic script first so window.marked is set before module code runs -->
  <script src="marked.min.js"></script>
  <script type="module" src="sidepanel.js"></script>
</body>
</html>
